<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cambiar contraseña</title>

<link rel="stylesheet" href="css/login.css">

<style>

.lock-icon{
  font-size:40px;
  text-align:center;
  margin-bottom:10px;
}

.title{
  font-size:22px;
  margin-bottom:8px;
}

.subtitle{
  text-align:center;
  font-size:14px;
  color:#555;
  background:#fce479;
  padding:10px;
  border-radius:8px;
  margin-bottom:20px;
}

.form{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.input{
  width:100%;
}

.main-btn{
  margin-top:10px;
}

.note{
  font-size:12px;
  text-align:center;
  color:#a3a3a3;
  margin-top:15px;
}

</style>

</head>

<body>

<div class="card">

<div class="lock-icon">🔒</div>

<h2 class="title">Cambiar contraseña</h2>

<p class="subtitle">
⚠ Por seguridad debes crear una nueva contraseña antes de continuar.
</p>

<form id="formClave" class="form">

<input 
type="password" 
id="nuevaClave" 
placeholder="Nueva contraseña"
class="input"
required
>

<input 
type="password" 
id="confirmClave" 
placeholder="Confirmar contraseña"
class="input"
required
>

<button class="main-btn">
Actualizar contraseña
</button>

</form>

<p class="note">
Esta acción solo se realiza la primera vez que inicias sesión.
</p>

</div>

<script type="module">

import { cambiarClaveVet } from "./js/auth.js";

const form = document.getElementById("formClave");

form.addEventListener("submit",(e)=>{

  e.preventDefault();

  const pass1 = document.getElementById("nuevaClave").value;
  const pass2 = document.getElementById("confirmClave").value;

  if(pass1 !== pass2){
    alert("Las contraseñas no coinciden");
    return;
  }

  cambiarClaveVet(pass1);

  alert("Contraseña actualizada");

  window.location.href="index.html";

});

</script>

</body>
</html>
